name: ksheermitra
description: Smart Milk Delivery System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.2
  
  # State Management
  provider: ^6.1.1
  
  # HTTP & API
  http: ^1.1.0
  dio: ^5.4.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Maps
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  
  # UI Components
  flutter_spinkit: ^5.2.0
  intl: ^0.18.1
  fluttertoast: ^8.2.10
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  
  # PDF
  pdf: ^3.10.7
  printing: ^5.11.1
  path_provider: ^2.1.1
  
  # Icons
  font_awesome_flutter: ^10.6.0
  
  # Charts
  fl_chart: ^0.65.0
  
  # Image Picker
  image_picker: ^1.0.5
  
  # QR Code Scanner (for admin)
  qr_code_scanner: ^1.0.1
  
  # Pin Code Input
  pinput: ^3.0.1

  # Package Info
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/

# Configuration for app launcher icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true

  # Android adaptive icon (for Android 8.0+)
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"

#  fonts:
